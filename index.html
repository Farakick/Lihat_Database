<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>📊 Data Arie Loundry</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary: #4a90e2;
            --primary-dark: #2c6db5;
            --primary-light: #e8f1fb;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a2332;
            --muted: #7a8999;
            --border: #dde3ea;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --shadow: 0 2px 12px rgba(74,144,226,0.10);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 18px 16px 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(44,109,181,0.25);
        }
        .app-header h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .app-header p {
            font-size: 12px;
            opacity: 0.82;
            margin-top: 2px;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-refresh {
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-refresh:active { background: rgba(255,255,255,0.30); }
        .btn-refresh:disabled { opacity: 0.5; }

        /* ===== TABS BULAN ===== */
        .tabs-wrap {
            background: var(--card);
            border-bottom: 1.5px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: sticky;
            top: 72px;
            z-index: 90;
        }
        .tabs-wrap::-webkit-scrollbar { display: none; }
        .tabs {
            display: flex;
            gap: 0;
            min-width: max-content;
            padding: 0 8px;
        }
        .tab-btn {
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
            position: relative;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-btn .badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 4px;
            font-weight: 700;
        }
        .tab-btn.active .badge {
            background: var(--primary);
            color: white;
        }

        /* ===== KONTEN UTAMA ===== */
        .main-content {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== STAT CARDS ===== */
        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: var(--card);
            border-radius: 12px;
            padding: 14px 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .stat-card .label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 4px;
            line-height: 1;
        }
        .stat-card .value.green { color: var(--success); }
        .stat-card .value.orange { color: var(--warning); }

        /* ===== SEARCH ===== */
        .search-box {
            position: relative;
            margin-bottom: 12px;
        }
        .search-box input {
            width: 100%;
            padding: 11px 16px 11px 40px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-box .icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }

        /* ===== TRANSAKSI CARDS ===== */
        .trx-list { display: flex; flex-direction: column; gap: 10px; }
        .trx-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.15s;
        }
        .trx-card:active { box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .trx-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 14px 10px;
            border-bottom: 1px solid var(--border);
            gap: 8px;
        }
        .trx-nama {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        .trx-tanggal {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }
        .trx-total {
            font-size: 15px;
            font-weight: 800;
            color: var(--primary);
            white-space: nowrap;
        }
        .trx-detail {
            padding: 10px 14px;
        }
        .trx-layanan {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }
        .trx-layanan strong {
            color: var(--text);
            font-size: 12px;
        }
        .trx-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 7px;
        }
        .chip {
            background: var(--primary-light);
            color: var(--primary-dark);
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
        }
        .chip.dp { background: #e8f8ef; color: var(--success); }
        .chip.hutang { background: #fdecea; color: var(--danger); }
        .trx-note {
            font-size: 11px;
            color: var(--warning);
            margin-top: 6px;
            background: #fefbf3;
            padding: 5px 8px;
            border-radius: 6px;
            border-left: 3px solid var(--warning);
        }

        /* ===== EMPTY / LOADING ===== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            gap: 10px;
            color: var(--muted);
            font-size: 14px;
        }
        .spinner {
            width: 22px; height: 22px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== ERROR ===== */
        .error-box {
            background: #fdecea;
            border: 1px solid #f5c6c2;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            margin: 20px 0;
        }
        .error-box p { color: var(--danger); font-size: 13px; }
        .error-box small { color: var(--muted); font-size: 11px; display: block; margin-top: 4px; }

        /* ===== FOOTER INFO ===== */
        .footer-info {
            text-align: center;
            padding: 20px 16px;
            font-size: 11px;
            color: var(--muted);
        }

        /* ===== INSTRUKSI SETUP ===== */
        .setup-card {
            background: var(--card);
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
        }
        .setup-card h3 { color: var(--primary); font-size: 14px; margin-bottom: 10px; }
        .setup-card ol { padding-left: 18px; }
        .setup-card li { font-size: 13px; margin-bottom: 6px; color: var(--text); line-height: 1.4; }
        .setup-card code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            color: var(--primary-dark);
            word-break: break-all;
        }
        .setup-card .warning {
            background: #fefbf3;
            border-left: 3px solid var(--warning);
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #8a6000;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-row">
            <div>
                <h1>🧺 Data Arie Loundry</h1>
                <p id="headerSubtitle">Memuat data...</p>
            </div>
            <button class="btn-refresh" id="btnRefresh" onclick="muatUlangData()">🔄 Muat Ulang</button>
        </div>
    </div>

    <div class="tabs-wrap" id="tabsWrap" style="display:none;">
        <div class="tabs" id="tabsContainer"></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <span>Mengambil data...</span>
        </div>
    </div>

    <div class="footer-info" id="footerInfo" style="display:none;">
        <p>Terakhir diperbarui: <span id="lastUpdate">-</span></p>
    </div>

<script>
    // ============================================================
    //  ⚙️  KONFIGURASI — GANTI URL DI BAWAH INI
    // ============================================================
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwt-ySg3pW9CWH4cqFcp83CVVOf4oEDo8MPOI-o6SqpfWO6aN__uKkz3L2VEz1U6upc0Q/exec';
    // ============================================================

    let semuaData = {};       // { "Jan 2025": [...], "Feb 2025": [...] }
    let bulanAktif = '';
    let querySearch = '';

    const NAMA_BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

    // ===== FORMAT =====
    function formatRupiah(n) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);
    }
    function formatTanggal(str) {
        if (!str) return '-';
        const d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    // ===== MUAT DATA DARI GOOGLE SCRIPT =====
    async function muatUlangData() {
        const btn = document.getElementById('btnRefresh');
        btn.disabled = true; btn.textContent = '⏳ Memuat...';
        document.getElementById('mainContent').innerHTML = `
            <div class="loading-spinner"><div class="spinner"></div><span>Mengambil data...</span></div>`;
        document.getElementById('tabsWrap').style.display = 'none';
        document.getElementById('footerInfo').style.display = 'none';
        document.getElementById('headerSubtitle').textContent = 'Memuat data...';

        try {
            const url = GOOGLE_SCRIPT_URL + '?action=getData&t=' + Date.now();
            const resp = await fetch(url);
            const json = await resp.json();

            if (json.status === 'ok' && json.sheets) {
                semuaData = json.sheets;  // { sheetName: [rows...] }
                inisialisasiTabs();
            } else {
                tampilkanError('Data tidak dikenali dari server.', JSON.stringify(json));
            }
        } catch (e) {
            tampilkanError('Gagal terhubung ke server.', e.message);
        }

        btn.disabled = false; btn.textContent = '🔄 Muat Ulang';
    }

    // ===== SETUP TABS =====
    function inisialisasiTabs() {
        const sheetNames = Object.keys(semuaData);
        if (sheetNames.length === 0) {
            tampilkanError('Tidak ada data sheet yang ditemukan.', 'Pastikan Google Script sudah dikonfigurasi dengan benar.');
            return;
        }

        // Urutkan dari terbaru
        sheetNames.sort((a, b) => {
            const da = parseSheetName(a), db = parseSheetName(b);
            return db - da;
        });

        const tabsContainer = document.getElementById('tabsContainer');
        tabsContainer.innerHTML = '';
        sheetNames.forEach((name, i) => {
            const jml = semuaData[name].length;
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
            btn.innerHTML = `${name} <span class="badge">${jml}</span>`;
            btn.onclick = () => pilihBulan(name);
            tabsContainer.appendChild(btn);
        });

        document.getElementById('tabsWrap').style.display = 'block';
        document.getElementById('footerInfo').style.display = 'block';
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('id-ID');

        pilihBulan(sheetNames[0]);
    }

    function parseSheetName(name) {
        // Coba parse "Jan 2025" atau "2025-01" dll.
        const parts = name.split(/[\s\-\/]/);
        let bulan = 0, tahun = 0;
        parts.forEach(p => {
            const n = parseInt(p);
            if (!isNaN(n) && n > 1000) tahun = n;
            const bi = NAMA_BULAN.findIndex(b => b.toLowerCase().startsWith(p.toLowerCase().slice(0, 3)));
            if (bi >= 0) bulan = bi;
        });
        return tahun * 100 + bulan;
    }

    // ===== PILIH BULAN / TAB =====
    function pilihBulan(nama) {
        bulanAktif = nama;
        querySearch = '';

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.trim().startsWith(nama));
        });

        // Scroll tab ke tengah
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn'))
            .find(b => b.textContent.trim().startsWith(nama));
        if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

        renderHalaman();
    }

    // ===== RENDER HALAMAN =====
    function renderHalaman() {
        const rows = semuaData[bulanAktif] || [];
        const mainContent = document.getElementById('mainContent');

        // Filter search
        const filtered = querySearch
            ? rows.filter(r => JSON.stringify(r).toLowerCase().includes(querySearch.toLowerCase()))
            : rows;

        // Hitung statistik — kolom: A=0 Waktu, B=1 Nama, C=2 Layanan,
        //   D=3 Total Qty, E=4 Total Harga, F=5 Deposit, G=6 Sisa Bayar
        const totalTrx = filtered.length;
        const totalOmset = filtered.reduce((s, r) => s + (parseFloat(r[4]) || 0), 0);
        const totalSisa  = filtered.reduce((s, r) => s + (parseFloat(r[6]) || 0), 0);
        const totalDP    = filtered.reduce((s, r) => s + (parseFloat(r[5]) || 0), 0);

        document.getElementById('headerSubtitle').textContent = `${bulanAktif} · ${totalTrx} transaksi`;

        let html = '';

        // Stat cards
        html += `
        <div class="stat-row">
            <div class="stat-card">
                <div class="label">Total Transaksi</div>
                <div class="value">${totalTrx}</div>
            </div>
            <div class="stat-card">
                <div class="label">Omset Kotor</div>
                <div class="value" style="font-size:14px;">${formatRupiah(totalOmset)}</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Sisa Bayar</div>
                <div class="value green" style="font-size:13px;">${formatRupiah(totalSisa)}</div>
            </div>
            <div class="stat-card">
                <div class="label">Total DP Masuk</div>
                <div class="value orange" style="font-size:13px;">${formatRupiah(totalDP)}</div>
            </div>
        </div>`;

        // Search
        html += `
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Cari nama, layanan..." 
                value="${querySearch}" 
                oninput="cariData(this.value)"
                autocomplete="off">
        </div>`;

        // List transaksi
        if (filtered.length === 0) {
            html += `<div class="empty-state">
                <div class="icon">📭</div>
                <p>${querySearch ? 'Tidak ada hasil untuk "<b>' + querySearch + '</b>"' : 'Belum ada data di bulan ini.'}</p>
            </div>`;
        } else {
            html += '<div class="trx-list">';
            // Tampilkan dari yang terbaru
            [...filtered].reverse().forEach(r => {
                html += renderKartuTrx(r);
            });
            html += '</div>';
        }

        mainContent.innerHTML = html;
    }

    function renderKartuTrx(r) {
        // Baca per index kolom:
        // A=0 Waktu, B=1 Nama, C=2 Layanan, D=3 Total Qty,
        // E=4 Total Harga, F=5 Deposit, G=6 Sisa Bayar, H=7 Catatan (jika ada)
        const tanggal = r[0] || '';
        const nama    = r[1] || 'Umum';
        const layanan = r[2] || '-';
        const qty     = r[3] || 0;
        const total   = parseFloat(r[4]) || 0;
        const deposit = parseFloat(r[5]) || 0;
        const sisa    = parseFloat(r[6]) || 0;
        const catatan = r[7] || '';
        const utang   = 0;

        let chips = `<span class="chip">${layanan}</span>`;
        if (deposit > 0) chips += `<span class="chip dp">DP ${formatRupiah(deposit)}</span>`;
        if (utang > 0) chips += `<span class="chip hutang">Utang ${formatRupiah(utang)}</span>`;

        let noteHtml = '';
        if (catatan && catatan.trim()) {
            noteHtml = `<div class="trx-note">📝 ${catatan}</div>`;
        }

        return `
        <div class="trx-card">
            <div class="trx-card-header">
                <div>
                    <div class="trx-nama">${nama}</div>
                    <div class="trx-tanggal">${formatTanggal(tanggal)}</div>
                </div>
                <div class="trx-total">${formatRupiah(sisa > 0 ? sisa : total)}</div>
            </div>
            <div class="trx-detail">
                <div class="trx-chips">${chips}</div>
                ${noteHtml}
            </div>
        </div>`;
    }

    function cariData(val) {
        querySearch = val;
        renderHalaman();
    }

    function tampilkanError(pesan, detail) {
        document.getElementById('headerSubtitle').textContent = 'Gagal memuat data';
        document.getElementById('mainContent').innerHTML = `
            <div class="error-box">
                <p>⚠️ ${pesan}</p>
                <small>${detail || ''}</small>
            </div>
            <div class="setup-card">
                <h3>⚙️ Cara Setup Viewer Ini</h3>
                <p style="font-size:12px; color:#555; margin-bottom:10px;">
                    Agar halaman ini bisa membaca data dari Google Sheets, Google Apps Script kamu perlu menambahkan fungsi <b>doGet()</b> untuk mengirim data.
                </p>
                <ol>
                    <li>Buka Google Apps Script yang sudah kamu buat</li>
                    <li>Tambahkan kode <code>doGet()</code> di bawah ini ke script kamu</li>
                    <li>Simpan & <b>Deploy ulang</b> sebagai Web App</li>
                    <li>Pastikan akses diatur ke <b>"Anyone"</b></li>
                </ol>
                <div class="warning">
                    💡 Kode <code>doGet()</code> yang perlu ditambahkan ada di file <b>PETUNJUK_SETUP.txt</b> yang ikut ter-download bersama file ini.
                </div>
            </div>`;
    }

    // ===== INIT =====
    muatUlangData();
</script>
</body>
</html>
